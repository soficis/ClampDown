name: Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag name to publish (for example: v0.4.1)
        required: true
        type: string
      release_name:
        description: Optional release title override
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-x64-package:
    name: Windows x64 package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ClampDown.sln

      - name: Build (Release)
        run: dotnet build ClampDown.sln -c Release --no-restore

      - name: Publish win-x64 executable
        shell: pwsh
        run: ./scripts/Publish-Exe.ps1 -Runtime win-x64 -Configuration Release

      - name: Create release archive
        shell: pwsh
        run: |
          $releaseRoot = "dist/release/windows"
          New-Item -ItemType Directory -Force -Path $releaseRoot | Out-Null

          $exePath = "dist/ClampDown/win-x64/ClampDown.exe"
          if (-not (Test-Path $exePath)) {
            throw "Executable not found at $exePath"
          }

          $zipName = "ClampDown-windows-x64.zip"
          $zipPath = Join-Path $releaseRoot $zipName
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $exePath -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Set-Content "$zipPath.sha256"

      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: |
            dist/release/windows/ClampDown-windows-x64.zip
            dist/release/windows/ClampDown-windows-x64.zip.sha256
          if-no-files-found: error

  publish-release-assets:
    name: Publish assets to GitHub Release
    if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && always() }}
    runs-on: ubuntu-24.04
    needs:
      - windows-x64-package
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            name="${{ github.event.release.name }}"
            prerelease="${{ github.event.release.prerelease }}"
          else
            tag="${{ inputs.release_tag }}"
            name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [[ -z "$name" ]]; then
            name="ClampDown Release ${tag}"
          fi

          {
            echo "tag=$tag"
            echo "name=$name"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release assets exist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if (( ${#assets[@]} == 0 )); then
            echo "No release artifacts were found in release-assets/." >&2
            exit 1
          fi

      - name: Publish assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: ${{ steps.release-meta.outputs.name }}
          prerelease: ${{ steps.release-meta.outputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
