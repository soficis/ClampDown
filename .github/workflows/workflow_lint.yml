name: Workflow Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.*"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.8
